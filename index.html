<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FareShare | Split Instantly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🛒 FareShare</h1>
        </header>

        <div class="input-card">
            <div class="input-group">
                <input type="text" id="itemName" placeholder="Item (e.g. Hotdog)">
                <input type="number" id="itemPrice" placeholder="Total Price (30.00)" step="0.01">
            </div>

            <div class="selection-header">
                <span class="selection-label">Who is sharing?</span>
                <button type="button" class="small-btn" onclick="selectAll()">Select All</button>
            </div>
            
            <!-- This grid will have Checkbox, Name, and Quantity Input -->
            <div id="split-group" class="split-grid"></div>

            <button id="add-item" onclick="addItem()">Add to Receipt</button>
        </div>

        <div class="receipt">
            <div id="totals-container" class="totals-grid"></div>
            <div id="itemList" class="item-list"></div>
        </div>

        <div class="action-group">
            <button id="share-btn" onclick="shareReceipt()">SHARE SUMMARY</button>
            <button id="reset-btn" onclick="resetAll()">RESET ALL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
