<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FareShare | Split Instantly</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>🛒 FareShare</h1>
        </header>

        <div class="input-card">
            <div class="input-group">
                <input type="text" id="itemName" placeholder="Item (e.g. Milk)">
                <input type="number" id="itemPrice" placeholder="$ 0.00" step="0.01">
            </div>

            <div class="toggle-group">
                <button class="toggle-btn active" onclick="setOwner('Shared', this)">Shared</button>
                <button class="toggle-btn" onclick="setOwner('Chris', this)">Chris</button>
                <button class="toggle-btn" onclick="setOwner('Pat', this)">Pat</button>
            </div>

            <button id="add-item" onclick="addItem()">Add to Receipt</button>
        </div>

        <div class="receipt">
            <div class="totals">
                <div class="total-box">
                    <h3>Chris Pays</h3>
                    <p id="chrisTotal">$0.00</p>
                </div>
                <div class="total-box" style="border-left: 1px solid #e2e8f0;">
                    <h3>Pat Pays</h3>
                    <p id="patTotal">$0.00</p>
                </div>
            </div>
            <div id="itemList" class="item-list">
                <!-- Items appear here -->
            </div>
        </div>
        <button id="reset-btn" onclick="resetAll()">Reset for New Trip</button>

    </div>

<script src="script.js"></script>
</body>

</html>
