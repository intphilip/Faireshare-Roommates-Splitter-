<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FareShare | Split Instantly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🛒 FareShare</h1>
        </header>

        <div class="input-card">
            <!-- Item Details -->
            <div class="input-group">
                <input type="text" id="itemName" placeholder="Item (e.g. Hotdog)">
                <input type="number" id="itemPrice" placeholder="Total Price (30.00)" step="0.01">
            </div>

            <!-- Dynamic Person Adder -->
            <div class="add-person-group">
                <input type="text" id="newPersonName" placeholder="Add new friend (e.g. Jumbo)">
                <button type="button" class="add-inline-btn" onclick="addNewPerson()">+ Add</button>
            </div>

            <div class="selection-header">
                <span class="selection-label">Who is sharing?</span>
                <button type="button" class="small-btn" onclick="selectAll()">Select All</button>
            </div>
            
            <!-- This grid holds the Checkbox, Name, and Quantity Inputs -->
            <div id="split-group" class="split-grid"></div>

            <button id="add-item" onclick="addItem()">Add to Receipt</button>
        </div>

        <div class="receipt">
            <div id="totals-container" class="totals-grid"></div>
            <div id="itemList" class="item-list"></div>
        </div>

        <div class="action-group">
            <button id="print-btn" onclick="printReceipt()">PRINT RECEIPT</button>
            <button id="reset-btn" onclick="resetAll()">RESET ALL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
